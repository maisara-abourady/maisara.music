<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MAISARA</title>
  <meta name="description" content="Maisara - Music Artist">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      background: #0a0e1a;
    }

    .hero {
      width: 100vw;
      height: 100vh;
      position: relative;
      background-image: url('assets/hero-bg.png');
      background-size: cover;
      background-position: center top;
      background-repeat: no-repeat;
    }

    /* ── Social Icons ── */
    .social-icons {
      position: absolute;
      top: 40px;
      right: 120px;
      display: flex;
      gap: 30px;
      align-items: center;
    }

    .icon-wrap {
      position: relative;
      cursor: pointer;
    }

    .icon-wrap .halo {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 35px; height: 35px;
      background: #74BFFF;
      border-radius: 50%;
      opacity: 0;
      filter: blur(18px);
      transition: opacity 150ms;
      z-index: -1;
      pointer-events: none;
    }

    .icon-wrap:hover .halo { opacity: 1; }

    .icon-wrap svg {
      fill: #fff;
      width: 22.5px;
      height: 24px;
      transition: fill 150ms;
      display: block;
    }

    .icon-wrap:hover svg { fill: #77b0d1; }

    /* Beatport icon - slightly different sizing */
    .icon-wrap.beatport { margin-left: -4.5px; }
    .icon-wrap.beatport svg { width: 23.92px; height: 25.52px; }

    /* ── Separator Line ── */
    .separator {
      position: absolute;
      bottom: 13vh;
      left: 15vw;
      width: 70vw;
      height: 2px;
      background-color: #9ca3af;
      opacity: 0.5;
    }

    /* ── Bottom Nav ── */
    .bottom-nav {
      position: absolute;
      bottom: 0;
      left: 15vw;
      width: 70vw;
      height: 13vh;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-item {
      position: relative;
    }

    .nav-item .halo {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 50px; height: 50px;
      background: #74BFFF;
      border-radius: 50%;
      opacity: 0;
      filter: blur(70px);
      transition: opacity 150ms;
      z-index: -1;
      pointer-events: none;
    }

    .nav-item:hover .halo { opacity: 1; }

    .nav-item button {
      font-family: 'Poppins', sans-serif;
      font-weight: bold;
      color: #fff;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      font-size: 1rem;
      transition: color 150ms;
    }

    .nav-item:hover button { color: #77b0d1; }

    /* ── Mobile Menu Button ── */
    .mobile-menu-btn {
      display: none;
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 100;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      padding: 9px;
      cursor: pointer;
      color: #fff;
      font-size: 18px;
      line-height: 1;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      transition: background 150ms;
    }

    .mobile-menu-btn:hover { background: rgba(255, 255, 255, 0.1); }

    /* ── Mobile Popover Menu ── */
    .mobile-popover {
      display: none;
      position: absolute;
      top: 60px;
      right: 20px;
      z-index: 99;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      padding: 8px 20px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      flex-direction: column;
      min-width: 140px;
    }

    .mobile-popover.open { display: flex; }

    .mobile-popover a {
      color: #fff;
      text-decoration: none;
      font-size: 12px;
      font-weight: normal;
      padding: 12px 0;
      transition: color 150ms;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .mobile-popover a:last-child { border-bottom: none; }
    .mobile-popover a:hover { color: #77b0d1; }

    /* ── Mobile Styles ── */
    @media (max-width: 768px) {
      .social-icons {
        top: auto;
        right: auto;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        gap: 20px;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(30px);
        -webkit-backdrop-filter: blur(30px);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 20px;
        padding: 12px 16px;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      }

      .icon-wrap svg {
        width: 15.75px;
        height: 16.8px;
      }

      .icon-wrap.beatport svg {
        width: 16.74px;
        height: 17.86px;
      }

      .icon-wrap.beatport { margin-left: 0; }

      .icon-wrap .halo { opacity: 0 !important; }

      .separator { display: none; }
      .bottom-nav { display: none; }
      .mobile-menu-btn { display: block; }
    }
  </style>
</head>

      </div>

      </div>

    <!-- Mobile Menu Button -->
    <button class="mobile-menu-btn" id="menuBtn" aria-label="Menu">&#9776;</button>

    <!-- Mobile Popover -->
    <div class="mobile-popover" id="menuPopover">
      <a href="#philosophy">My Philosophy</a>
      <a href="#style">My Style</a>
      <a href="#projects">Projects</a>
      <a href="#bookings">Bookings</a>
    </div>
  </div>

  <script>
    const menuBtn = document.getElementById('menuBtn');
    const popover = document.getElementById('menuPopover');
    let menuOpen = false;

    menuBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      menuOpen = !menuOpen;
      popover.classList.toggle('open', menuOpen);
      menuBtn.innerHTML = menuOpen ? '&#10005;' : '&#9776;';
    });

    document.addEventListener('click', (e) => {
      if (menuOpen && !popover.contains(e.target) && e.target !== menuBtn) {
        menuOpen = false;
        popover.classList.remove('open');
        menuBtn.innerHTML = '&#9776;';
      }
    });

    popover.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        menuOpen = false;
        popover.classList.remove('open');
        menuBtn.innerHTML = '&#9776;';
      });
    });
  </script>
